# Self-hosted DeviceSDK — single container serving the API, device
# WebSockets, and the dashboard UI on one port.
#
#   docker compose up -d
#   open http://localhost:8080  (first visit creates the admin account)
#
# Devices on your LAN connect to ws://<this-machine>:8080.
services:
  devicesdk:
    image: ghcr.io/device-sdk/devicesdk-monorepo:latest
    # To build from source instead:
    # build: .
    ports:
      - "8080:8080"
    volumes:
      # All persistent state: SQLite database, device scripts, firmware images.
      - ./data:/data
    environment:
      # The first registered user is always allowed; set this to "false"
      # afterwards to prevent further account sign-ups.
      ALLOW_REGISTRATION: "false"
      # Set to "false" only when running plain HTTP on a trusted LAN without a
      # reverse proxy. Production / HTTPS deployments must keep this "true".
      SECURE_COOKIES: "true"
    restart: unless-stopped
