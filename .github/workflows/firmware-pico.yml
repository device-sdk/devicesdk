name: Firmware — Pico

on:
  push:
    branches: [main]
    paths: [firmware/pico/**]
  pull_request:
    branches: [main]
    paths: [firmware/pico/**]
  workflow_dispatch:

concurrency:
  group: firmware-pico-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: firmware/pico

jobs:
  unit-tests:
    name: Host unit tests
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore gtest build cache
        uses: actions/cache@v5
        with:
          path: firmware/pico/test/build/_deps
          key: pico-gtest-${{ hashFiles('firmware/pico/test/CMakeLists.txt') }}

      - name: Build and run tests
        working-directory: firmware/pico/test
        run: |
          cmake -B build
          cmake --build build -j$(nproc)
          ./build/run_tests

  build:
    name: Build Pico firmware
    needs: unit-tests
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve PICO_SDK_PATH
        # `runner.*` context is not available in job-level `env:`; export it
        # via $GITHUB_ENV here so later steps can use ${{ env.PICO_SDK_PATH }}.
        run: echo "PICO_SDK_PATH=$RUNNER_TEMP/pico-sdk" >> "$GITHUB_ENV"

      # Build deps (cmake, gcc-arm-none-eabi, libnewlib-arm-none-eabi,
      # build-essential, ninja-build) are pre-installed on the runner.

      - name: Restore pico-sdk cache
        id: restore-pico-sdk
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.PICO_SDK_PATH }}
          key: pico-sdk-${{ hashFiles('firmware/pico/pico_sdk_import.cmake') }}

      - name: Install pico-sdk
        if: steps.restore-pico-sdk.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk ${PICO_SDK_PATH}
          git -C ${PICO_SDK_PATH} submodule update --init

      - name: Save pico-sdk cache
        if: steps.restore-pico-sdk.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.PICO_SDK_PATH }}
          key: pico-sdk-${{ hashFiles('firmware/pico/pico_sdk_import.cmake') }}

      - name: Build firmware artifacts
        run: |
          rm -rf dist && mkdir -p dist
          DEVICESDK_BOARD=pico_w make build
          cp build/devicesdk-client.uf2 dist/devicesdk-pico-w-client.uf2
          DEVICESDK_BOARD=pico2_w make build
          cp build/devicesdk-client.uf2 dist/devicesdk-pico2-w-client.uf2

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: devicesdk-pico-firmware
          path: |
            firmware/pico/dist/devicesdk-pico-w-client.uf2
            firmware/pico/dist/devicesdk-pico2-w-client.uf2
          if-no-files-found: error

  detect-version-bump:
    name: Detect firmware version bump
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    timeout-minutes: 5
    outputs:
      bumped: ${{ steps.check.outputs.bumped }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compare firmware package version with previous main commit
        id: check
        working-directory: firmware/pico
        run: |
          current_version=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
          echo "version=$current_version" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" != "push" ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          previous_version=$(git show "${{ github.event.before }}:firmware/pico/package.json" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['version'])")
          if [ "$current_version" != "$previous_version" ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi

  publish-release:
    name: Publish firmware to GitHub Release
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    timeout-minutes: 10
    needs: [build, detect-version-bump]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && needs.detect-version-bump.outputs.bumped == 'true')
    permissions:
      contents: write
    # The workflow-level default working-directory is firmware/pico, but
    # download-artifact extracts relative to the repository root and the
    # firmware-dist/ path is repo-root relative.
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: devicesdk-pico-firmware
          path: firmware-dist/

      # Versioned releases per firmware family — see firmware-esp32.yml.
      # Each publish creates a unique tag so immutable-release repositories do
      # not need to delete/recreate a rolling tag.
      - name: Upload binaries to the firmware-pico release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="firmware-pico@v${{ needs.detect-version-bump.outputs.version }}"
          gh release create "$tag" \
            --target ${{ github.sha }} \
            --title "Pico firmware v${{ needs.detect-version-bump.outputs.version }}" \
            --notes "Pico W / Pico 2 W client UF2s for @devicesdk/firmware-pico v${{ needs.detect-version-bump.outputs.version }}." \
            --latest=false \
            firmware-dist/devicesdk-pico-w-client.uf2 \
            firmware-dist/devicesdk-pico2-w-client.uf2
