{{ define "main" }}
<article class="pt-8 pb-20 px-4 sm:px-6 lg:px-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-12">
            <h1 class="text-4xl font-bold text-gray-900">{{ .Title }}</h1>
            {{ with .Description }}
            <p class="mt-4 text-xl text-gray-600">{{ . }}</p>
            {{ end }}
        </header>
        
        <div class="prose prose-lg max-w-none">
            {{ .Content }}
        </div>
    </div>
</article>
{{ end }}
