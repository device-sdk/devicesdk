name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt JS actions (checkout, cache, setup-node…) onto Node 24 now.
  # GitHub will default-force this on 2026-06-02.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.job }}-${{ github.ref_name }}-
            turbo-${{ github.job }}-
      - name: Biome
        run: pnpm exec biome ci apps/api apps/simulation packages/core packages/cli
      - name: ESLint (dashboard)
        run: pnpm exec turbo run lint

  typecheck:
    name: Type Check
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.job }}-${{ github.ref_name }}-
            turbo-${{ github.job }}-
      - run: pnpm exec turbo run check-types

  test:
    name: Test
    needs: [lint, typecheck]
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.job }}-${{ github.ref_name }}-
            turbo-${{ github.job }}-
      - run: pnpm exec turbo run test --filter='!@devicesdk/dashboard'
      - name: API Coverage Report
        run: pnpm --filter @devicesdk/api test:coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage/
          retention-days: 14

  changeset:
    name: Changeset
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Check for changeset
        run: |
          # Allow the automated changeset version PR to pass without a changeset
          if git log --oneline origin/main..HEAD | grep -q "chore: version packages"; then
            echo "Version packages commit detected, skipping changeset check"
            exit 0
          fi
          pnpm exec changeset status --since=origin/main
