<!doctype html>
<html>
  <head>
    <title><%= productName %></title>

    <meta charset="utf-8" />
    <meta name="description" content="<%= productDescription %>" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta
      name="viewport"
      content="initial-scale=1, width=device-width<% if (ctx.mode.cordova || ctx.mode.capacitor) { %>, viewport-fit=cover<% } %>"
    />

    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <style>
      /* Boot splash: shown until the Vue app mounts (after the auth probe), so
         the first paint isn't a blank white screen. Removed in App.vue's
         onMounted. Respects OS dark mode. */
      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        z-index: 9999;
      }
      #app-splash .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(0, 0, 0, 0.1);
        border-top-color: rgba(0, 0, 0, 0.55);
        border-radius: 50%;
        animation: app-splash-spin 0.7s linear infinite;
      }
      @keyframes app-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-color-scheme: dark) {
        #app-splash {
          background: hsl(240, 10%, 6%);
        }
        #app-splash .spinner {
          border-color: rgba(255, 255, 255, 0.15);
          border-top-color: rgba(255, 255, 255, 0.6);
        }
      }
    </style>
  </head>
  <body>
    <div id="app-splash"><div class="spinner"></div></div>
    <!-- quasar:entry-point -->
  </body>
</html>
