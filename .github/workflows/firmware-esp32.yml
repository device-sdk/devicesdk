name: Firmware — ESP32

on:
  push:
    branches: [main]
    paths: [firmware/esp32/**]
  pull_request:
    branches: [main]
    paths: [firmware/esp32/**]

jobs:
  unit-tests:
    name: Host unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore gtest build cache
        uses: actions/cache@v4
        with:
          path: firmware/esp32/test/build/_deps
          key: esp32-gtest-${{ hashFiles('firmware/esp32/test/CMakeLists.txt') }}

      - name: Build and run tests
        working-directory: firmware/esp32/test
        run: |
          cmake -B build
          cmake --build build -j$(nproc)
          ./build/run_tests

  python-tests:
    name: Python protocol tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: Run protocol tests
        working-directory: firmware/esp32
        run: python -m pytest test_websocket_mock.py test_message_handler.py test_integration.py -v

  build:
    name: Build ESP32 firmware
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: espressif/idf:v5.5.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore managed components cache
        uses: actions/cache@v4
        with:
          path: firmware/esp32/managed_components
          key: esp32-components-${{ hashFiles('firmware/esp32/main/idf_component.yml') }}

      - name: Build firmware
        working-directory: firmware/esp32
        run: |
          . $IDF_PATH/export.sh
          idf.py build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: devicesdk-esp32-firmware
          path: |
            firmware/esp32/build/iotkit-client.bin
            firmware/esp32/build/bootloader/bootloader.bin
            firmware/esp32/build/partition_table/partition-table.bin
          if-no-files-found: warn
