name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Minimal token scope — no job needs write access (the changeset job only reads,
# artifacts upload via the Actions API).
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Restore Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.job }}-${{ github.ref_name }}-
            turbo-${{ github.job }}-
      - name: Biome
        run: pnpm exec biome ci apps/server apps/simulation packages/core packages/cli
      - name: ESLint (dashboard)
        run: pnpm exec turbo run lint

  typecheck:
    name: Type Check
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Restore Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.job }}-${{ github.ref_name }}-
            turbo-${{ github.job }}-
      - run: pnpm exec turbo run check-types

  test:
    name: Test
    needs: [lint, typecheck]
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      # The @devicesdk/server test script runs on Bun, which isn't on the
      # self-hosted runner's default PATH.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.14'
      - run: pnpm install --frozen-lockfile
      - name: Restore Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.job }}-${{ github.ref_name }}-
            turbo-${{ github.job }}-
      - run: pnpm exec turbo run test --filter='!@devicesdk/dashboard'

  server-e2e-tests:
    name: Server E2E Tests
    needs: [lint, typecheck]
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      # The server e2e suite boots the real Bun server in-process (Bun.serve on an
      # ephemeral port) and drives it over HTTP + device/watcher WebSockets.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.14'
      - run: pnpm install --frozen-lockfile
      - name: Build dependencies
        run: pnpm build --filter @devicesdk/core
      # Runs `bun test src tests --coverage`; bunfig.toml enforces the >=85%
      # line/function coverage threshold and fails the job if it regresses.
      - name: Run server e2e tests with coverage
        run: pnpm --filter @devicesdk/server test:coverage

  component-tests:
    name: Component Tests
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run component tests
        run: pnpm test:unit
        working-directory: apps/dashboard

  e2e-tests:
    name: E2E Tests
    if: github.event_name == 'pull_request'
    needs: component-tests
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      # The E2E harness boots the real Bun server (apps/server) as the backend.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.14'
      # The shared self-hosted runner's global pnpm store can be left in a bad
      # state by earlier jobs, causing transient segfaults during install. Retry
      # once after wiping the store if the first attempt crashes.
      - name: Install dependencies
        run: |
          for attempt in 1 2; do
            pnpm install --frozen-lockfile && exit 0
            echo "pnpm install failed on attempt $attempt; clearing store and retrying"
            rm -rf "$(pnpm store path)" || true
            sleep 5
          done
          exit 1
      - name: Restore Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.job }}-${{ github.ref_name }}-
            turbo-${{ github.job }}-
      - name: Build dependencies
        run: pnpm build --filter @devicesdk/core
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/dashboard/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright browsers
        # System libs are pre-installed on the self-hosted runner — skip --with-deps
        # which requires passwordless sudo. Browser binaries still cache to ~/.cache.
        run: npx playwright install chromium
        working-directory: apps/dashboard
      - name: Run E2E tests
        run: npx playwright test --config tests/e2e/playwright.config.ts
        working-directory: apps/dashboard
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            apps/dashboard/playwright-report/
            apps/dashboard/test-results/
          retention-days: 7

  changeset:
    name: Changeset
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Check for changeset
        run: |
          # Allow the automated changeset version PR to pass without a changeset
          if git log --oneline origin/main..HEAD | grep -q "chore: version packages"; then
            echo "Version packages commit detected, skipping changeset check"
            exit 0
          fi
          pnpm exec changeset status --since=origin/main
