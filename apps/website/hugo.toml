baseURL = 'https://devicesdk.com/'
languageCode = 'en-us'
title = 'DeviceSDK — Deploy TypeScript to ESP32 & Raspberry Pi Pico'
enableRobotsTXT = false
enableGitInfo = true
disableKinds = ["taxonomy", "term"]

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[frontmatter]
  date = ["date", ":git", "lastmod", "publishDate"]
  lastmod = ["lastmod", ":git", "date", "publishDate"]

[[module.mounts]]
  source = "content"
  target = "content"

[[module.mounts]]
  source = "../../docs/public"
  target = "content/docs"
[outputs]
  home = ["HTML"]

[params]
  description = "Managed platform for shipping TypeScript firmware to ESP32 and Pi Pico. Write, deploy, and stream telemetry over WebSocket in minutes."
  dashboardUrl = "/early-access/"
  docsUrl = "https://devicesdk.com/docs"
  githubUrl = "https://github.com/device-sdk"
  discordUrl = "https://discord.gg/WuNhbXGsBy"
  twitterUrl = "https://x.com/devicesdk"

