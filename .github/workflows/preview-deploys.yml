name: Preview Deploys

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/dashboard/**'
      - 'apps/website/**'
      - 'apps/api/**'
      - 'docs/**'
      - 'packages/core/**'

concurrency:
  group: preview-deploys-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt JS actions (checkout, cache, setup-node…) onto Node 24 now.
  # GitHub will default-force this on 2026-06-02.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    name: Detect changes
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    outputs:
      dashboard: ${{ steps.filter.outputs.dashboard }}
      website: ${{ steps.filter.outputs.website }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dashboard:
              - 'apps/dashboard/**'
              - 'packages/core/**'
            website:
              - 'apps/website/**'
              - 'apps/api/**'
              - 'docs/**'

  preview-dashboard:
    name: Preview Dashboard
    needs: changes
    if: needs.changes.outputs.dashboard == 'true'
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.job }}-${{ github.ref_name }}-
            turbo-${{ github.job }}-
      - run: pnpm build --filter @devicesdk/dashboard
      - name: Upload preview version
        id: upload
        working-directory: apps/dashboard
        # `versions upload` produces a preview Worker version without promoting
        # it to production. The CLI prints "Version Preview URL: <url>" — grep
        # it out for the sticky PR comment below.
        run: |
          set -o pipefail
          OUT=$(npx wrangler versions upload --tag "pr-${{ github.event.number }}" --message "PR #${{ github.event.number }} (${{ github.sha }})" 2>&1 | tee /dev/stderr)
          URL=$(echo "$OUT" | grep -oE 'https://[A-Za-z0-9.-]+\.workers\.dev' | head -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 888e736867edd3b81b49b17c9067d5df
      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-dashboard
          message: |
            **Dashboard preview** ready for PR #${{ github.event.number }}:

            ${{ steps.upload.outputs.url }}

            <sub>Updated for commit ${{ github.sha }}.</sub>

  preview-website:
    name: Preview Website
    needs: changes
    if: needs.changes.outputs.website == 'true'
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true
      - run: pnpm install --frozen-lockfile
      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.job }}-${{ github.ref_name }}-
            turbo-${{ github.job }}-
      - name: Install Playwright browsers
        # `--with-deps` would try to `sudo apt-get install` system libs, which
        # fails on the self-hosted runner (no passwordless sudo). The persistent
        # proxmox runner has those libs pre-installed.
        run: pnpm --filter @devicesdk/website exec playwright install chromium
      - name: Build website
        run: pnpm build --filter @devicesdk/website
      - name: Upload preview version
        id: upload
        working-directory: apps/website
        run: |
          set -o pipefail
          OUT=$(npx wrangler versions upload --tag "pr-${{ github.event.number }}" --message "PR #${{ github.event.number }} (${{ github.sha }})" 2>&1 | tee /dev/stderr)
          URL=$(echo "$OUT" | grep -oE 'https://[A-Za-z0-9.-]+\.workers\.dev' | head -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 888e736867edd3b81b49b17c9067d5df
      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-website
          message: |
            **Website preview** ready for PR #${{ github.event.number }}:

            ${{ steps.upload.outputs.url }}

            <sub>Updated for commit ${{ github.sha }}.</sub>
