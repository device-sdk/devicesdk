name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'apps/website/**'
      - 'docs/public/**'
      - 'apps/server/src/**'
      - 'apps/server/scripts/generate-openapi.ts'
      - '.github/workflows/website-deploy.yml'

concurrency:
  group: website-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy to Cloudflare Pages
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: turbo-website-deploy-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-website-deploy-${{ github.ref_name }}-
            turbo-website-deploy-

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/website/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        # System libs are pre-installed on the self-hosted runner.
        run: npx playwright install chromium
        working-directory: apps/website

      - name: Build website
        run: pnpm exec turbo run build --filter @devicesdk/website

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter @devicesdk/website deploy
