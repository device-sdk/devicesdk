baseURL = 'https://devicesdk.com/'
languageCode = 'en-us'
title = 'DeviceSDK - Build IoT Applications with TypeScript'
enableRobotsTXT = true
enableGitInfo = true
disableKinds = ["taxonomy", "term"]

[[module.mounts]]
  source = "content"
  target = "content"

[[module.mounts]]
  source = "../../docs"
  target = "content/docs"
