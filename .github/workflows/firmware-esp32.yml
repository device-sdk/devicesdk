name: Firmware — ESP32

on:
  push:
    branches: [main]
    paths: [firmware/esp32/**]
  pull_request:
    branches: [main]
    paths: [firmware/esp32/**]
  workflow_dispatch:

concurrency:
  group: firmware-esp32-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt JS actions (checkout, cache, setup-node…) onto Node 24 now.
  # GitHub will default-force this on 2026-06-02.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-tests:
    name: Host unit tests
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore gtest build cache
        uses: actions/cache@v4
        with:
          path: firmware/esp32/test/build/_deps
          key: esp32-gtest-${{ hashFiles('firmware/esp32/test/CMakeLists.txt') }}

      - name: Build and run tests
        working-directory: firmware/esp32/test
        run: |
          cmake -B build
          cmake --build build -j$(nproc)
          ./build/run_tests

  python-tests:
    name: Python protocol tests
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Self-hosted Debian runner: setup-python has no Debian prebuilts, so use
      # the system Python (3.11+) in a venv to satisfy PEP 668.
      - name: Install pytest in a venv
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet pytest

      - name: Run protocol tests
        working-directory: firmware/esp32
        run: ../../.venv/bin/python -m pytest test_websocket_mock.py test_message_handler.py test_integration.py -v

  build:
    name: Build ESP32 firmware (${{ matrix.target }})
    needs: [unit-tests, python-tests]
    # proxmox-ephemeral image is expected to have system libs that ESP-IDF's
    # install.sh probes during post-install verify — currently libusb-1.0-0
    # for openocd-esp32. Bake new prereqs into the image rather than the job.
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    permissions:
      contents: read
    env:
      IDF_VERSION: v5.5.1
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: esp32
            bootloader_offset: "0x1000"
          - target: esp32c61
            bootloader_offset: "0x0"
          - target: esp32c3
            bootloader_offset: "0x0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve ESP-IDF paths
        # `runner.*` context is not available in job-level `env:`; export via
        # $GITHUB_ENV so later steps and the cache `path:` can use them.
        run: |
          echo "IDF_PATH=$RUNNER_TEMP/esp-idf" >> "$GITHUB_ENV"
          echo "IDF_TOOLS_PATH=$RUNNER_TEMP/.espressif" >> "$GITHUB_ENV"

      - name: Restore esp-idf clone cache
        id: restore-idf-src
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.IDF_PATH }}
          key: esp-idf-src-${{ env.IDF_VERSION }}

      - name: Clone esp-idf
        if: steps.restore-idf-src.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$IDF_VERSION" --recursive \
            https://github.com/espressif/esp-idf.git "$IDF_PATH"

      - name: Save esp-idf clone cache
        if: steps.restore-idf-src.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.IDF_PATH }}
          key: esp-idf-src-${{ env.IDF_VERSION }}

      - name: Restore esp-idf tools cache
        id: restore-idf-tools
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.IDF_TOOLS_PATH }}
          key: esp-idf-tools-${{ env.IDF_VERSION }}-esp32-esp32c3-esp32c61

      - name: Install esp-idf toolchains
        if: steps.restore-idf-tools.outputs.cache-hit != 'true'
        run: "$IDF_PATH/install.sh esp32,esp32c3,esp32c61"

      - name: Save esp-idf tools cache
        if: steps.restore-idf-tools.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.IDF_TOOLS_PATH }}
          key: esp-idf-tools-${{ env.IDF_VERSION }}-esp32-esp32c3-esp32c61

      - name: Restore managed components cache
        uses: actions/cache@v4
        with:
          path: firmware/esp32/managed_components
          key: esp32-components-${{ matrix.target }}-${{ hashFiles('firmware/esp32/main/idf_component.yml') }}

      - name: Build firmware
        working-directory: firmware/esp32
        run: |
          . "$IDF_PATH/export.sh"
          idf.py set-target ${{ matrix.target }}
          idf.py build

      - name: Merge binary
        working-directory: firmware/esp32
        run: |
          . "$IDF_PATH/export.sh"
          mkdir -p dist
          esptool.py --chip ${{ matrix.target }} merge_bin \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            -o dist/${{ matrix.target }}-client.bin \
            ${{ matrix.bootloader_offset }} build/bootloader/bootloader.bin \
            0x8000 build/partition_table/partition-table.bin \
            0x10000 build/iotkit-client.bin

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: devicesdk-${{ matrix.target }}-firmware
          path: firmware/esp32/dist/${{ matrix.target }}-client.bin
          if-no-files-found: error

  upload-to-r2:
    name: Upload firmware to R2
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        target: [esp32, esp32c61, esp32c3]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: devicesdk-${{ matrix.target }}-firmware
          path: firmware/

      - name: Upload ${{ matrix.target }} firmware to R2
        run: npx wrangler r2 object put devicesdk-firmwares/${{ matrix.target }}-client.bin --file=firmware/${{ matrix.target }}-client.bin --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Account-owned API tokens cannot call /memberships; supplying the
          # account id directly lets wrangler skip that lookup and go straight
          # to R2.
          CLOUDFLARE_ACCOUNT_ID: 888e736867edd3b81b49b17c9067d5df
