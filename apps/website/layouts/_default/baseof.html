<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}" class="scroll-smooth">
<head>
    {{- partial "head.html" . -}}
</head>
<body class="font-sans antialiased bg-zinc-950 text-zinc-50">
    {{- partial "header.html" . -}}

    <main class="pt-14">
        {{- block "main" . }}{{- end }}
    </main>

    {{- partial "footer.html" . -}}

    {{- partial "ai-search.html" . -}}

    {{- partial "webmcp.html" . -}}

    {{- block "scripts" . }}{{- end }}
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Mobile menu toggle
            var menuBtn = document.getElementById('mobile-menu-button');
            var menu = document.getElementById('mobile-menu');
            if (menuBtn && menu) {
                menuBtn.addEventListener('click', function() {
                    menu.classList.toggle('hidden');
                });
            }

            // Scroll animations — handles legacy .fade-up plus new .reveal / .reveal-stagger
            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('animate-in', 'is-revealed');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });

            document.querySelectorAll('.fade-up, .reveal, .reveal-stagger').forEach(function(el) {
                observer.observe(el);
            });

            // Navbar border on scroll
            var nav = document.querySelector('nav');
            if (nav) {
                window.addEventListener('scroll', function() {
                    if (window.scrollY > 10) {
                        nav.classList.add('border-b-zinc-700');
                    } else {
                        nav.classList.remove('border-b-zinc-700');
                    }
                });
            }

            // Scroll assembly scene — drives --p / --p1..p5 from scroll progress
            var scene = document.querySelector('[data-scroll-scene="assembly"]');
            if (scene && !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                var captions = scene.querySelectorAll('[data-caption]');
                var ticking = false;
                // Eased slice helper: 0..1 progress within a window, with easeInOutCubic
                function slice(p, start, end) {
                    var t = Math.max(0, Math.min(1, (p - start) / (end - start)));
                    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                }
                function update() {
                    ticking = false;
                    var rect = scene.getBoundingClientRect();
                    var vh = window.innerHeight;
                    // Progress: 0 when scene top hits viewport top, 1 when scene bottom hits viewport bottom
                    var travel = scene.offsetHeight - vh;
                    var raw = travel > 0 ? (-rect.top) / travel : 0;
                    var p = Math.max(0, Math.min(1, raw));
                    scene.style.setProperty('--p',  p.toFixed(4));
                    scene.style.setProperty('--p1', slice(p, 0.00, 0.22).toFixed(4));
                    scene.style.setProperty('--p2', slice(p, 0.18, 0.42).toFixed(4));
                    scene.style.setProperty('--p3', slice(p, 0.34, 0.58).toFixed(4));
                    scene.style.setProperty('--p4', slice(p, 0.50, 0.74).toFixed(4));
                    scene.style.setProperty('--p5', slice(p, 0.68, 0.95).toFixed(4));
                    // Caption swap: pick stage 0..3 based on overall progress
                    var stage = p < 0.25 ? 0 : p < 0.5 ? 1 : p < 0.78 ? 2 : 3;
                    captions.forEach(function(el) {
                        if (parseInt(el.getAttribute('data-caption'), 10) === stage) {
                            el.classList.add('is-active');
                        } else {
                            el.classList.remove('is-active');
                        }
                    });
                }
                function onScroll() {
                    if (!ticking) {
                        requestAnimationFrame(update);
                        ticking = true;
                    }
                }
                window.addEventListener('scroll', onScroll, { passive: true });
                window.addEventListener('resize', onScroll);
                update();
            } else if (scene) {
                // Reduced motion: lock to assembled state and show final caption
                scene.style.setProperty('--p', 1);
                ['--p1','--p2','--p3','--p4','--p5'].forEach(function(v) { scene.style.setProperty(v, 1); });
                var last = scene.querySelector('[data-caption="3"]');
                if (last) last.classList.add('is-active');
            }
        });
    </script>
</body>
</html>
