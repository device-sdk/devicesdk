<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DeviceSDK API Reference</title>
  <meta name="description" content="Interactive reference for the DeviceSDK REST API. Browse endpoints, view request/response schemas, and try calls from your browser." />
  <link rel="icon" href="/logo.svg" type="image/svg+xml" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/swagger-ui-dist@5.32.4/swagger-ui.css"
    integrity="sha384-AHNbXeU7DPcgcihnwKYc3FOT0hTfhEwVFc2JRxxF5S/mplUdt/7G1g6nIblzENrX"
    crossorigin="anonymous" />
  <style>
    body { margin: 0; background: #fafafa; }
    .swagger-ui .topbar { display: none; }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>
  <script
    src="https://unpkg.com/swagger-ui-dist@5.32.4/swagger-ui-bundle.js"
    integrity="sha384-FgJpbEfGqpFeiFJh0+HNvyohx84XMd+IwgPyxJxjuDFMHVYmoFqrDEJNrVFexwA0"
    crossorigin="anonymous"></script>
  <script
    src="https://unpkg.com/swagger-ui-dist@5.32.4/swagger-ui-standalone-preset.js"
    integrity="sha384-49fpFaVrAWI/qdgl9Vv5E/4NXxRUiJX5vGuLws1NUpTWGtEqzWEx8gHTw2UTehFK"
    crossorigin="anonymous"></script>
  <script>
    window.addEventListener('load', function () {
      window.ui = SwaggerUIBundle({
        url: './openapi.json',
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [SwaggerUIBundle.plugins.DownloadUrl],
        layout: 'StandaloneLayout',
        tryItOutEnabled: true,
        persistAuthorization: true
      });
    });
  </script>
</body>
</html>
