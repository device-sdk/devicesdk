name: Dashboard Tests

on:
  pull_request:
    branches: [main]

concurrency:
  group: dashboard-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  component-tests:
    name: Component Tests
    runs-on: [self-hosted, linux, proxmox]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run component tests
        run: pnpm test:unit
        working-directory: apps/dashboard

  e2e-tests:
    name: E2E Tests
    runs-on: [self-hosted, linux, proxmox]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build dependencies
        run: pnpm build --filter @devicesdk/core
      - name: Install Playwright browsers
        # System libs are pre-installed on the self-hosted runner — skip --with-deps
        # which requires passwordless sudo. Browser binaries still cache to ~/.cache.
        run: npx playwright install chromium
        working-directory: apps/dashboard
      - name: Create API dev vars
        run: echo "ENV=local" > apps/api/.dev.vars
      - name: Run E2E tests
        run: npx playwright test --config tests/e2e/playwright.config.ts
        working-directory: apps/dashboard
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/dashboard/playwright-report/
            apps/dashboard/test-results/
          retention-days: 7
