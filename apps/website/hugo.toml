baseURL = 'https://devicesdk.com/'
languageCode = 'en-us'
title = 'DeviceSDK — Deploy TypeScript to ESP32 & Raspberry Pi Pico'
enableRobotsTXT = false
enableGitInfo = true
disableKinds = ["taxonomy", "term"]

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[frontmatter]
  date = ["date", ":git", "lastmod", "publishDate"]
  lastmod = ["lastmod", ":git", "date", "publishDate"]

[[module.mounts]]
  source = "content"
  target = "content"

[[module.mounts]]
  source = "../../docs/public"
  target = "content/docs"

# Output formats for AI coding agents.
# - llms.txt   : curated index of the docs (home only).
# - llms-full.txt : full concatenation of every doc page (home only).
# - md        : per-page Markdown mirror at <page-url>/index.md so agents can
#               fetch the raw doc instead of parsing rendered HTML.
[outputFormats.LLMS]
  baseName = "llms"
  isPlainText = true
  mediaType = "text/plain"
  notAlternative = true

[outputFormats.LLMSFull]
  baseName = "llms-full"
  isPlainText = true
  mediaType = "text/plain"
  notAlternative = true

[outputFormats.MD]
  baseName = "index"
  isPlainText = true
  mediaType = "text/markdown"
  notAlternative = true

[outputs]
  home = ["HTML", "LLMS", "LLMSFull"]
  page = ["HTML", "MD"]
  section = ["HTML", "MD"]

[mediaTypes."text/markdown"]
  suffixes = ["md"]

[params]
  description = "Free, open-source, self-hosted IoT platform. Write TypeScript device scripts, run the server on your own hardware (Raspberry Pi, NUC, NAS, Docker), and connect ESP32 & Pi Pico devices over WebSocket."
  # Primary call-to-action target. DeviceSDK is self-hosted and free, so the CTA
  # points at the quickstart rather than a hosted dashboard sign-up.
  dashboardUrl = "/docs/quickstart/"
  docsUrl = "https://devicesdk.com/docs"
  githubUrl = "https://github.com/device-sdk"
  discordUrl = "https://discord.gg/WuNhbXGsBy"
  twitterUrl = "https://x.com/devicesdk"

