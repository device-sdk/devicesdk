{{ define "main" }}
<section class="pt-8 pb-20 px-4 sm:px-6 lg:px-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-12">
            <h1 class="text-4xl font-bold text-gray-900">{{ .Title }}</h1>
            {{ with .Description }}
            <p class="mt-4 text-xl text-gray-600">{{ . }}</p>
            {{ end }}
        </header>
        
        {{ if .Content }}
        <div class="prose prose-lg max-w-none mb-12">
            {{ .Content }}
        </div>
        {{ end }}
        
        {{ if .Pages }}
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            {{ range .Pages }}
            <a href="{{ .Permalink }}" class="p-6 bg-white border border-gray-200 rounded-xl card-hover">
                <h2 class="text-lg font-semibold text-gray-900">{{ .Title }}</h2>
                {{ with .Description }}
                <p class="mt-2 text-gray-600 text-sm">{{ . }}</p>
                {{ end }}
            </a>
            {{ end }}
        </div>
        {{ end }}
    </div>
</section>
{{ end }}
