name: Firmware — Pico

on:
  push:
    branches: [main]
    paths: [firmware/pico/**]
  pull_request:
    branches: [main]
    paths: [firmware/pico/**]
  workflow_dispatch:

concurrency:
  group: firmware-pico-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: firmware/pico

jobs:
  unit-tests:
    name: Host unit tests
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore gtest build cache
        uses: actions/cache@v5
        with:
          path: firmware/pico/test/build/_deps
          key: pico-gtest-${{ hashFiles('firmware/pico/test/CMakeLists.txt') }}

      - name: Build and run tests
        working-directory: firmware/pico/test
        run: |
          cmake -B build
          cmake --build build -j$(nproc)
          ./build/run_tests

  build:
    name: Build Pico firmware
    needs: unit-tests
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve PICO_SDK_PATH
        # `runner.*` context is not available in job-level `env:`; export it
        # via $GITHUB_ENV here so later steps can use ${{ env.PICO_SDK_PATH }}.
        run: echo "PICO_SDK_PATH=$RUNNER_TEMP/pico-sdk" >> "$GITHUB_ENV"

      # Build deps (cmake, gcc-arm-none-eabi, libnewlib-arm-none-eabi,
      # build-essential, ninja-build) are pre-installed on the runner.

      - name: Restore pico-sdk cache
        id: restore-pico-sdk
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.PICO_SDK_PATH }}
          key: pico-sdk-${{ hashFiles('firmware/pico/pico_sdk_import.cmake') }}

      - name: Install pico-sdk
        if: steps.restore-pico-sdk.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk ${PICO_SDK_PATH}
          git -C ${PICO_SDK_PATH} submodule update --init

      - name: Save pico-sdk cache
        if: steps.restore-pico-sdk.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.PICO_SDK_PATH }}
          key: pico-sdk-${{ hashFiles('firmware/pico/pico_sdk_import.cmake') }}

      - name: Build firmware artifacts
        run: |
          rm -rf dist && mkdir -p dist
          IOTKIT_BOARD=pico_w make build
          cp build/devicesdk-client.uf2 dist/devicesdk-pico-w-client.uf2
          IOTKIT_BOARD=pico2_w make build
          cp build/devicesdk-client.uf2 dist/devicesdk-pico2-w-client.uf2

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: devicesdk-pico-firmware
          path: |
            firmware/pico/dist/devicesdk-pico-w-client.uf2
            firmware/pico/dist/devicesdk-pico2-w-client.uf2
          if-no-files-found: error

  upload-to-r2:
    name: Upload firmware to R2
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      # The artifact upload only needs wrangler, but this runner ships no
      # Node — set it up the same way the ci.yml jobs do and install the
      # workspace's pinned wrangler (apps/api → catalog) rather than letting
      # `npx` pull an unpinned latest.
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - name: Install wrangler
        run: pnpm install --frozen-lockfile --filter @devicesdk/api

      - uses: actions/download-artifact@v8
        with:
          name: devicesdk-pico-firmware
          path: firmware/

      # `pnpm --filter … exec` runs wrangler with CWD set to apps/api, so the
      # --file path must be absolute — the artifact is downloaded to the
      # workspace-root firmware/ dir, not apps/api/firmware/.
      - name: Upload Pico W firmware to R2
        run: pnpm --filter @devicesdk/api exec wrangler r2 object put devicesdk-firmwares/devicesdk-pico-w-client.uf2 --file="$GITHUB_WORKSPACE/firmware/devicesdk-pico-w-client.uf2" --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 888e736867edd3b81b49b17c9067d5df

      - name: Upload Pico 2W firmware to R2
        run: pnpm --filter @devicesdk/api exec wrangler r2 object put devicesdk-firmwares/devicesdk-pico2-w-client.uf2 --file="$GITHUB_WORKSPACE/firmware/devicesdk-pico2-w-client.uf2" --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 888e736867edd3b81b49b17c9067d5df
