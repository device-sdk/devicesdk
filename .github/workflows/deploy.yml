name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# Deploys authenticate with a separate Cloudflare API token; the GitHub token
# only needs read access to check out the repo.
permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    outputs:
      api: ${{ steps.filter.outputs.api }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      website: ${{ steps.filter.outputs.website }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/core/**'
            dashboard:
              - 'apps/dashboard/**'
            website:
              - 'apps/website/**'
              - 'docs/**'

  deploy-api:
    name: Deploy API
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    needs: changes
    if: needs.changes.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Restore Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.job }}-${{ github.ref_name }}-
            turbo-${{ github.job }}-
      - run: pnpm build --filter @devicesdk/api
      - name: Apply D1 migrations
        run: cd apps/api && npx wrangler d1 migrations apply DB --remote --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Account-owned API tokens cannot call /memberships; supplying the
          # account id directly lets wrangler skip that lookup.
          CLOUDFLARE_ACCOUNT_ID: 888e736867edd3b81b49b17c9067d5df
      - name: Deploy API Worker
        run: cd apps/api && npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 888e736867edd3b81b49b17c9067d5df

  deploy-dashboard:
    name: Deploy Dashboard
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    needs: changes
    if: needs.changes.outputs.dashboard == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Restore Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.job }}-${{ github.ref_name }}-
            turbo-${{ github.job }}-
      - run: pnpm build --filter @devicesdk/dashboard
      - name: Deploy Dashboard
        run: cd apps/dashboard && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 888e736867edd3b81b49b17c9067d5df

  deploy-website:
    name: Deploy Website
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    needs: changes
    if: needs.changes.outputs.website == 'true' || needs.changes.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3
        with:
          hugo-version: 'latest'
          extended: true
      - run: pnpm install --frozen-lockfile
      - name: Restore Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.job }}-${{ github.ref_name }}-
            turbo-${{ github.job }}-
      - name: Install Playwright browsers
        # `--with-deps` would try to `sudo apt-get install` system libs, which
        # fails on the self-hosted runner (no passwordless sudo). The persistent
        # proxmox runner has those libs pre-installed on the host, so downloading
        # the chromium binary alone is sufficient.
        run: pnpm --filter @devicesdk/website exec playwright install chromium
      - name: Build Website
        run: pnpm build --filter @devicesdk/website
      - name: Deploy Website
        run: cd apps/website && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 888e736867edd3b81b49b17c9067d5df
