name: Firmware — ESP32

on:
  push:
    branches: [main]
    paths: [firmware/esp32/**]
  pull_request:
    branches: [main]
    paths: [firmware/esp32/**]
  workflow_dispatch:

concurrency:
  group: firmware-esp32-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Host unit tests
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore gtest build cache
        uses: actions/cache@v5
        with:
          path: firmware/esp32/test/build/_deps
          key: esp32-gtest-${{ hashFiles('firmware/esp32/test/CMakeLists.txt') }}

      - name: Build and run tests
        working-directory: firmware/esp32/test
        run: |
          cmake -B build
          cmake --build build -j$(nproc)
          ./build/run_tests

  python-tests:
    name: Python protocol tests
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Self-hosted Debian runner: setup-python has no Debian prebuilts, so use
      # the system Python (3.11+) in a venv to satisfy PEP 668.
      - name: Install pytest in a venv
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet pytest

      - name: Run protocol tests
        working-directory: firmware/esp32
        run: ../../.venv/bin/python -m pytest test_websocket_mock.py test_message_handler.py test_integration.py -v

  build:
    name: Build ESP32 firmware
    needs: [unit-tests, python-tests]
    # All targets build in one job so the runner clones esp-idf and installs the
    # toolchains once, rather than fanning out to one runner per target.
    # proxmox-ephemeral image is expected to have system libs that ESP-IDF's
    # install.sh probes during post-install verify — currently libusb-1.0-0
    # for openocd-esp32. Bake new prereqs into the image rather than the job.
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    permissions:
      contents: read
    env:
      IDF_VERSION: v5.5.1

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve ESP-IDF paths
        # `runner.*` context is not available in job-level `env:`; export via
        # $GITHUB_ENV so later steps and the cache `path:` can use them.
        run: |
          echo "IDF_PATH=$RUNNER_TEMP/esp-idf" >> "$GITHUB_ENV"
          echo "IDF_TOOLS_PATH=$RUNNER_TEMP/.espressif" >> "$GITHUB_ENV"

      - name: Restore esp-idf clone cache
        id: restore-idf-src
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.IDF_PATH }}
          key: esp-idf-src-${{ env.IDF_VERSION }}

      - name: Clone esp-idf
        if: steps.restore-idf-src.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$IDF_VERSION" --recursive \
            https://github.com/espressif/esp-idf.git "$IDF_PATH"

      - name: Save esp-idf clone cache
        if: steps.restore-idf-src.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.IDF_PATH }}
          key: esp-idf-src-${{ env.IDF_VERSION }}

      - name: Restore esp-idf tools cache
        id: restore-idf-tools
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.IDF_TOOLS_PATH }}
          key: esp-idf-tools-${{ env.IDF_VERSION }}-esp32-esp32c3-esp32c61

      - name: Install esp-idf toolchains
        if: steps.restore-idf-tools.outputs.cache-hit != 'true'
        run: "$IDF_PATH/install.sh esp32,esp32c3,esp32c61"

      - name: Save esp-idf tools cache
        if: steps.restore-idf-tools.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.IDF_TOOLS_PATH }}
          key: esp-idf-tools-${{ env.IDF_VERSION }}-esp32-esp32c3-esp32c61

      - name: Restore managed components cache
        uses: actions/cache@v5
        with:
          path: firmware/esp32/managed_components
          key: esp32-components-${{ hashFiles('firmware/esp32/main/idf_component.yml') }}

      - name: Build firmware (all targets)
        working-directory: firmware/esp32
        # Build each target sequentially in this one job. `set-target` rewrites
        # sdkconfig and the build dir per target, so wipe both beforehand to
        # mirror a fresh checkout (sdkconfig + build are gitignored). The bare
        # esp32 bootloader sits at 0x1000; the RISC-V parts (c3/c61) at 0x0.
        run: |
          . "$IDF_PATH/export.sh"
          rm -rf dist && mkdir -p dist

          build_target() {
            target="$1"
            bootloader_offset="$2"
            echo "::group::Build $target"
            rm -rf build sdkconfig
            idf.py set-target "$target"
            idf.py build
            esptool.py --chip "$target" merge_bin \
              --flash_mode dio --flash_freq 40m --flash_size 4MB \
              -o "dist/$target-client.bin" \
              "$bootloader_offset" build/bootloader/bootloader.bin \
              0x8000 build/partition_table/partition-table.bin \
              0x10000 build/devicesdk-client.bin
            echo "::endgroup::"
          }

          build_target esp32 0x1000
          build_target esp32c61 0x0
          build_target esp32c3 0x0

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: devicesdk-esp32-firmware
          path: |
            firmware/esp32/dist/esp32-client.bin
            firmware/esp32/dist/esp32c61-client.bin
            firmware/esp32/dist/esp32c3-client.bin
          if-no-files-found: error

  detect-version-bump:
    name: Detect firmware version bump
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    outputs:
      bumped: ${{ steps.check.outputs.bumped }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compare firmware package version with previous main commit
        id: check
        working-directory: firmware/esp32
        run: |
          current_version=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
          echo "version=$current_version" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" != "push" ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          previous_version=$(git show "${{ github.event.before }}:firmware/esp32/package.json" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['version'])")
          if [ "$current_version" != "$previous_version" ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi

  publish-release:
    name: Publish firmware to GitHub Release
    runs-on: [self-hosted, linux, proxmox-ephemeral]
    needs: [build, detect-version-bump]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && needs.detect-version-bump.outputs.bumped == 'true')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: devicesdk-esp32-firmware
          path: firmware-dist/

      # Versioned releases per firmware family: each publish creates a unique
      # tag (firmware-esp32@vX.Y.Z) so immutable-release repositories do not
      # need to delete/recreate a rolling tag. The Dockerfile queries the
      # latest versioned release at image build time.
      - name: Upload binaries to the firmware-esp32 release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="firmware-esp32@v${{ needs.detect-version-bump.outputs.version }}"
          gh release create "$tag" \
            --target ${{ github.sha }} \
            --title "ESP32 firmware v${{ needs.detect-version-bump.outputs.version }}" \
            --notes "ESP32/C3/C61 client binaries for @devicesdk/firmware-esp32 v${{ needs.detect-version-bump.outputs.version }}." \
            --latest=false \
            firmware-dist/esp32-client.bin \
            firmware-dist/esp32c61-client.bin \
            firmware-dist/esp32c3-client.bin
